name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-release:
    name: Build (Release)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      - name: Download Pi Zero W cross-compiler (abhiTronix / Bookworm GCC 14.2.0)
        run: |
          curl -fL \
            "https://sourceforge.net/projects/raspberry-pi-cross-compilers/files/Raspberry%20Pi%20GCC%20Cross-Compiler%20Toolchains/Bookworm/GCC%2014.2.0/Raspberry%20Pi%201%2C%20Zero/cross-gcc-14.2.0-pi_0-1.tar.gz/download" \
            -o toolchain.tar.gz
          tar xf toolchain.tar.gz
          echo "$PWD/$(ls -d cross-pi-gcc-*/bin)" >> "$GITHUB_PATH"

      - name: Install ALSA into cross-compiler sysroot
        run: |
          CODENAME=$(lsb_release -sc)
          sudo dpkg --add-architecture armhf
          sudo sed -i '/^Architectures:/d' /etc/apt/sources.list.d/ubuntu.sources
          sudo sed -i 's/^Types: deb/Types: deb\nArchitectures: amd64/' \
              /etc/apt/sources.list.d/ubuntu.sources
          cat <<EOF | sudo tee /etc/apt/sources.list.d/armhf-ports.sources
          Types: deb
          URIs: http://ports.ubuntu.com/ubuntu-ports
          Suites: $CODENAME ${CODENAME}-updates ${CODENAME}-security
          Components: main universe
          Architectures: armhf
          Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg
          EOF
          sudo apt-get update -qq
          sudo apt-get install -y libasound2-dev:armhf
          SYSROOT=$(arm-linux-gnueabihf-gcc -print-sysroot)
          sudo cp -r /usr/include/alsa "$SYSROOT/usr/include/"
          sudo cp -Pf /usr/lib/arm-linux-gnueabihf/libasound.so* "$SYSROOT/usr/lib/"

      - name: Configure CMake (Release)
        run: |
          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE=cmake/toolchain-armv6.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -G Ninja

      - name: Build
        run: cmake --build build

      - name: Package
        run: |
          mkdir -p package
          cp build/sendspin-armv6 package/
          cp config/sendspin-armv6.conf package/
          cp config/sendspin-armv6.service package/
          cp scripts/upgrade.sh package/
          tar -czf sendspin-armv6-linux-armv6-release.tar.gz -C package .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sendspin-armv6-linux-armv6-release
          path: sendspin-armv6-linux-armv6-release.tar.gz

  build-debug:
    name: Build (Debug)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      - name: Download Pi Zero W cross-compiler (abhiTronix / Bookworm GCC 14.2.0)
        run: |
          curl -fL \
            "https://sourceforge.net/projects/raspberry-pi-cross-compilers/files/Raspberry%20Pi%20GCC%20Cross-Compiler%20Toolchains/Bookworm/GCC%2014.2.0/Raspberry%20Pi%201%2C%20Zero/cross-gcc-14.2.0-pi_0-1.tar.gz/download" \
            -o toolchain.tar.gz
          tar xf toolchain.tar.gz
          echo "$PWD/$(ls -d cross-pi-gcc-*/bin)" >> "$GITHUB_PATH"

      - name: Install ALSA into cross-compiler sysroot
        run: |
          CODENAME=$(lsb_release -sc)
          sudo dpkg --add-architecture armhf
          sudo sed -i '/^Architectures:/d' /etc/apt/sources.list.d/ubuntu.sources
          sudo sed -i 's/^Types: deb/Types: deb\nArchitectures: amd64/' \
              /etc/apt/sources.list.d/ubuntu.sources
          cat <<EOF | sudo tee /etc/apt/sources.list.d/armhf-ports.sources
          Types: deb
          URIs: http://ports.ubuntu.com/ubuntu-ports
          Suites: $CODENAME ${CODENAME}-updates ${CODENAME}-security
          Components: main universe
          Architectures: armhf
          Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg
          EOF
          sudo apt-get update -qq
          sudo apt-get install -y libasound2-dev:armhf
          SYSROOT=$(arm-linux-gnueabihf-gcc -print-sysroot)
          sudo cp -r /usr/include/alsa "$SYSROOT/usr/include/"
          sudo cp -Pf /usr/lib/arm-linux-gnueabihf/libasound.so* "$SYSROOT/usr/lib/"

      - name: Configure CMake (Debug)
        run: |
          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE=cmake/toolchain-armv6.cmake \
            -DCMAKE_BUILD_TYPE=Debug \
            -G Ninja

      - name: Build
        run: cmake --build build

      - name: Package
        run: |
          mkdir -p package
          cp build/sendspin-armv6 package/
          cp config/sendspin-armv6.conf package/
          cp config/sendspin-armv6.service package/
          tar -czf sendspin-armv6-linux-armv6-debug.tar.gz -C package .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sendspin-armv6-linux-armv6-debug
          path: sendspin-armv6-linux-armv6-debug.tar.gz

  publish:
    name: Publish GitHub Release
    needs: [build-release, build-debug]
    runs-on: ubuntu-latest
    steps:
      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: sendspin-armv6-linux-armv6-release

      - name: Download debug artifact
        uses: actions/download-artifact@v4
        with:
          name: sendspin-armv6-linux-armv6-debug

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            sendspin-armv6-linux-armv6-release.tar.gz
            sendspin-armv6-linux-armv6-debug.tar.gz
