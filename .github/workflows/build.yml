name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    name: Cross-compile for ARMv6
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cross-compilation toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf cmake ninja-build

      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE=cmake/toolchain-armv6.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -G Ninja

      - name: Build
        run: cmake --build build

      - name: Prepare release archive
        run: |
          mkdir -p release
          cp build/sendspin-armv6 release/
          cp config/sendspin-armv6.conf release/
          cp config/sendspin-armv6.service release/
          tar -czf sendspin-armv6-linux-armv6.tar.gz -C release .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: sendspin-armv6-linux-armv6
          path: sendspin-armv6-linux-armv6.tar.gz

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: sendspin-armv6-linux-armv6.tar.gz
