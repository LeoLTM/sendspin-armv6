name: Build Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Cross-compile (Release)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      # 1. Check for a cached toolchain
      - name: Cache Pi Zero W Toolchain
        id: cache-toolchain
        uses: actions/cache@v4
        with:
          path: rpi-toolchain
          # If you ever update the GCC version, change this key to invalidate the old cache
          key: ${{ runner.os }}-gcc-14.2.0-pi_0-1 

      # 2. Only download and extract if the cache missed
      - name: Download Pi Zero W cross-compiler (abhiTronix / Bookworm GCC 14.2.0)
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          curl -fL \
            "https://sourceforge.net/projects/raspberry-pi-cross-compilers/files/Raspberry%20Pi%20GCC%20Cross-Compiler%20Toolchains/Bookworm/GCC%2014.2.0/Raspberry%20Pi%201%2C%20Zero/cross-gcc-14.2.0-pi_0-1.tar.gz/download" \
            -o toolchain.tar.gz
          
          # Extract into a predictable, specific directory and strip the top-level folder
          mkdir -p rpi-toolchain
          tar xf toolchain.tar.gz -C rpi-toolchain --strip-components=1
          rm toolchain.tar.gz

      # 3. Always add to PATH (whether freshly downloaded or restored from cache)
      - name: Add Toolchain to PATH
        run: echo "$PWD/rpi-toolchain/bin" >> "$GITHUB_PATH"

      # 4. Install ALSA headers and ARMv6 library into the cross-compiler sysroot.
      #    The toolchain ships without libasound; we graft the armhf package in so
      #    the cross-compiler finds alsa/asoundlib.h and libasound.so with no extra
      #    CMake flags required.
      - name: Install ALSA into cross-compiler sysroot
        run: |
          CODENAME=$(lsb_release -sc)
          sudo dpkg --add-architecture armhf
          # Ubuntu's main archive (archive.ubuntu.com / security.ubuntu.com) only
          # serves amd64 packages; armhf lives on ports.ubuntu.com.  Restrict the
          # default DEB822 sources to amd64 and add a separate ports entry so that
          # apt-get update does not produce 404 errors for armhf index files.
          sudo sed -i '/^Architectures:/d' /etc/apt/sources.list.d/ubuntu.sources
          sudo sed -i 's/^Types: deb/Types: deb\nArchitectures: amd64/' \
              /etc/apt/sources.list.d/ubuntu.sources
          cat <<EOF | sudo tee /etc/apt/sources.list.d/armhf-ports.sources
          Types: deb
          URIs: http://ports.ubuntu.com/ubuntu-ports
          Suites: $CODENAME ${CODENAME}-updates ${CODENAME}-security
          Components: main universe
          Architectures: armhf
          Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg
          EOF
          sudo apt-get update -qq
          sudo apt-get install -y libasound2-dev:armhf
          SYSROOT=$(arm-linux-gnueabihf-gcc -print-sysroot)
          sudo cp -r /usr/include/alsa "$SYSROOT/usr/include/"
          sudo cp -Pf /usr/lib/arm-linux-gnueabihf/libasound.so* "$SYSROOT/usr/lib/"

      - name: Configure CMake (Release)
        run: |
          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE=cmake/toolchain-armv6.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -G Ninja

      - name: Build
        run: cmake --build build

      - name: Package
        run: |
          mkdir -p package
          cp build/sendspin-armv6 package/
          cp config/sendspin-armv6.conf package/
          cp config/sendspin-armv6.service package/
          tar -czf sendspin-armv6-linux-armv6-release.tar.gz -C package .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sendspin-armv6-linux-armv6-release
          path: sendspin-armv6-linux-armv6-release.tar.gz
